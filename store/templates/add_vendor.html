{% extends "base.html" %}
{% block title %}Add Vendor{% endblock %}
{% block content %}
<h2>Add New Vendor</h2>
<form method="POST">
    <div class="mb-3">
        <label>Vendor Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Contact (Phone)</label>
        <input type="text" name="contact" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Lead Time (days)</label>
        <input type="number" name="lead_time_days" class="form-control" value="2" required>
    </div>
    <div class="mb-3">
        <label>Login PIN (4 digits)</label>
        <input type="text" name="pin" class="form-control" value="1234" maxlength="4">
    </div>
    <button type="submit" class="btn btn-success">Add Vendor</button>
</form>
{% endblock %}
